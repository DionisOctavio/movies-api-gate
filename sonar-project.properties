sonar.projectKey=DionisOctavio_movies-api-gate
sonar.organization=dionisoctavio
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts,test/**/*.ts
sonar.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,test/**/*.ts,dist/**,coverage/**,node_modules/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/main.ts,src/**/*.module.ts,dist/**,**/*.spec.ts,**/*.interface.ts,**/*.dto.ts,**/*.entity.ts
